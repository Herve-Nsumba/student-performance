version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-student_performance_db}
      POSTGRES_USER:     ${POSTGRES_USER:-student_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-student_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-student_user}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI ML Service ──────────────────────────────────
  ml_service:
    build:
      context: ./backend/ml_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MODEL_PATH: /models/student_performance_rf.pkl
    volumes:
      - ./models:/models:ro
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API ──────────────────────────────────────────
  django:
    build:
      context: ./backend/django_app
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ml_service:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY:   ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG:        ${DJANGO_DEBUG:-True}
      DB_NAME:             ${POSTGRES_DB:-student_performance_db}
      DB_USER:             ${POSTGRES_USER:-student_user}
      DB_PASSWORD:         ${POSTGRES_PASSWORD:-student_pass}
      DB_HOST:             postgres
      DB_PORT:             "5432"
      ML_SERVICE_URL:      http://ml_service:8001
      ALLOWED_HOSTS:       ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"

  # ── Frontend (React + Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - django
    ports:
      - "80:80"

volumes:
  postgres_data:
